name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build backend image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-backend ./backend

      # Push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cloud-backend

      # DEPLOY TO EC2 (BACKEND)
      - name: Deploy Backend on EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-backend
            docker stop backend-container || true
            docker rm backend-container || true
            docker run -d -p 5000:5000 \
              --name backend-container \
              -e DB_HOST=cloudapp-db.c81qw2c8qcbp.us-east-1.rds.amazonaws.com \
              -e DB_USER=postgres \
              -e DB_PASSWORD=postgres123 \
              -e DB_NAME=cloudapp \
              ${{ secrets.DOCKER_USERNAME }}/cloud-backend

      # 🔹 Install frontend deps
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 🔹 Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 🔹 Upload to S3
      - name: Deploy frontend to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: frontend/build

      # OPTIONAL: Invalidate CloudFront
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}