name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build backend Docker image
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-backend ./backend

      # 4️⃣ Push backend Docker image
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cloud-backend

      # 5️⃣ Update Launch Template with new Docker image
      - name: Update Launch Template UserData
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          USER_DATA=$(cat <<'EOF' | base64 -w 0
          #!/bin/bash
          apt-get update -y
          apt-get install -y docker.io
          systemctl start docker
          systemctl enable docker
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-backend:latest
          docker stop backend || true
          docker rm backend || true
          docker run -d --name backend -p 5000:5000 \
            -e DB_HOST=${{ secrets.DB_HOST }} \
            -e DB_USER=${{ secrets.DB_USER }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=${{ secrets.DB_NAME }} \
            ${{ secrets.DOCKER_USERNAME }}/cloud-backend:latest
          EOF
          )
          aws ec2 create-launch-template-version \
            --launch-template-id ${{ secrets.LAUNCH_TEMPLATE_ID }} \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"$USER_DATA\"}" \
            --region $AWS_REGION
            
          LATEST=$(aws ec2 describe-launch-template-versions \
            --launch-template-id ${{ secrets.LAUNCH_TEMPLATE_ID }} \
            --query 'LaunchTemplateVersions[-1].VersionNumber' \
            --output text \
            --region $AWS_REGION)

          aws ec2 modify-launch-template \
            --launch-template-id ${{ secrets.LAUNCH_TEMPLATE_ID }} \
            --default-version $LATEST \
            --region $AWS_REGION

      # 6️⃣ Trigger Auto Scaling instance refresh
      - name: Refresh Auto Scaling Group instances
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
            --preferences MinHealthyPercentage=50,InstanceWarmup=60 \
            --region $AWS_REGION

      # 7️⃣ Frontend: Install dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 8️⃣ Frontend: Build production
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 9️⃣ Upload frontend build to S3
      - name: Deploy frontend to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: frontend/build

      # 🔟 CloudFront invalidation
      - name: Invalidate CloudFront cache
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"