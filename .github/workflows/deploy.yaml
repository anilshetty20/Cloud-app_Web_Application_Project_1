name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Docker login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 3️⃣ Build backend Docker image
      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cloud-backend ./backend

      # 4️⃣ Push backend Docker image
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cloud-backend

      # 5️⃣ Update Launch Template with new Docker image
      - name: Update Launch Template and Refresh ASG
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          LAUNCH_TEMPLATE_ID: ${{ secrets.LAUNCH_TEMPLATE_ID }}
          ASG_NAME: ${{ secrets.ASG_NAME }}
        run: |
          # Encode user-data
          USER_DATA=$(cat <<'EOF' | base64 -w 0
          #!/bin/bash
          apt-get update -y
          apt-get install -y docker.io
          systemctl start docker
          systemctl enable docker
          docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
          docker pull $DOCKER_USERNAME/cloud-backend:latest
          docker stop backend || true
          docker rm backend || true
          docker run -d --name backend -p 5000:5000 \
            -e DB_HOST=$DB_HOST \
            -e DB_USER=$DB_USER \
            -e DB_PASSWORD=$DB_PASSWORD \
            -e DB_NAME=$DB_NAME \
            $DOCKER_USERNAME/cloud-backend:latest
          EOF
          )

          # Create new Launch Template version
          aws ec2 create-launch-template-version \
            --launch-template-id $LAUNCH_TEMPLATE_ID \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"$USER_DATA\"}" \
            --region $AWS_REGION

          # Get the latest version number
          LATEST=$(aws ec2 describe-launch-template-versions \
            --launch-template-id $LAUNCH_TEMPLATE_ID \
            --query 'LaunchTemplateVersions[-1].VersionNumber' \
            --output text \
            --region $AWS_REGION)

          # Set the new version as default
          aws ec2 modify-launch-template \
            --launch-template-id $LAUNCH_TEMPLATE_ID \
            --default-version $LATEST \
            --region $AWS_REGION

          # Refresh Auto Scaling Group to pick up new template
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences MinHealthyPercentage=50,InstanceWarmup=60 \
            --region $AWS_REGION

      # 6️⃣ Frontend: Install dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 7️⃣ Frontend: Build production
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 8️⃣ Upload frontend build to S3
      - name: Deploy frontend to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SOURCE_DIR: frontend/build

      # 9️⃣ CloudFront invalidation
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}